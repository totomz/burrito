kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "rea.fullname" . }}
  annotations:    
    {{- include "rea.labels" . | nindent 4 }}  
  
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:          
          - path: /
            pathType: Prefix
            backend:              
              service:
                name: {{ include "rea.fullname" . }}
                port:
                  number: 80