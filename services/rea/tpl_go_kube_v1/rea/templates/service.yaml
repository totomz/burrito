apiVersion: v1
kind: Service
metadata:
  name: {{ include "rea.fullname" . }}
  labels:
    {{- include "rea.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.servicePort }}
      protocol: TCP
  selector:
    {{- include "rea.selectorLabels" . | nindent 4 }}
